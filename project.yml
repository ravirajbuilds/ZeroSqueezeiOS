name: ZeroSqueeze
options:
  bundleIdPrefix: com.samawritten
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: ZeroSqueeze/Resources/Info.plist

targets:
  ZeroSqueeze:
    type: application
    platform: iOS
    sources:
      - path: ZeroSqueeze
        excludes:
          - "Resources/Info.plist"
    resources:
      - ZeroSqueeze/Resources/Assets.xcassets
      - ZeroSqueeze/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zerosqueeze.ios
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ENABLE_PREVIEWS: YES

  ZeroSqueezeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ZeroSqueezeTests
    dependencies:
      - target: ZeroSqueeze
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zerosqueeze.ios.tests

schemes:
  ZeroSqueeze:
    build:
      targets:
        ZeroSqueeze: all
        ZeroSqueezeTests: [test]
    test:
      targets: [ZeroSqueezeTests]
